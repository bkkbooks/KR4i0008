body:
  text: 中山詩話宋劉攽撰太宗好文每進士及第賜聞喜宴常作詩賜之纍朝以為故事仁宗在位四十二年賜詩尤多然不必盡上所自作景祐初賜詩落句云寒儒逢景運報德合如何論者謂質厚宏壯真詔旨也劉子儀贈人詩云惠和官尚小師達祿須干取下惠聖之和師也達而子張學干之事或有除去官字示人曰此必番僧也其名達祿須干聞者大笑詩有詩病俗忌當避之此偶自諧合無若輕薄子何非筆力過也景祐中宋宣獻上楊太妃挽詩云神歸梁小廟禮祔漢餘陵文士稱其用事精當楊昌言詩曰先帝遺弓劒排雲上紫清同時受顧託今日見升平雖不用事意思宏深足為警語景祐末元昊叛夏鄭公出鎮長安梅送詩曰亞夫金鼓從天落韓信旌旗背水陳時獨刻公詩於石僧惠崇詩云河分岡勢斷春入燒痕青然唐人舊句而崇之弟子吟贈其師詩曰河分岡勢司空曙春入燒痕劉長卿不是師偷古人句古人詩句似師兄杜工部有峽束蒼江起巖排石樹圓頃蘇子美遂用峽束蒼江起巖排石樹作七言句子美豈竊詩者大抵諷古人詩多則往往為已得也王元之謫黃州詩曰又為太守黃州去依舊郎官白髮生在朝與執政不相能作江豚詩以譏之曰江雲漠漠江雨來天意為霖不干汝俗云豚出則有風雨又曰餐啖蝦魚頗肥腯譏其肥大人多取佳句為句圖特小巧美麗可喜皆指詠風景影似百物者爾不得見雄材逺思之人也梅聖俞愛嚴維詩曰栁塘春水慢花塢夕陽遲固善矣細較之夕陽遲則繫花春水慢何須栁也工部詩云深山催短景喬朩易髙風此可無瑕纇又曰蕭條九州內人少豺狼多少人慎莫投多虎信所過飢有易子食獸猶畏虞羅若此等句其含蓄深逺殆不可模效詩以意為主文詞次之或意深義髙雖文詞平易自是竒作世效古人平易句而不得其意義翻成鄙野可笑盧同云不即溜鈍漢非其意義自可掩口寧可效之邪韓吏部古詩髙卓至律詩雖稱善要有不工者而好韓之人句句稱述未可謂然也韓云老公真箇似童兒沒井埋盆作小池直諧戲語耳歐陽永叔江鄰幾論韓雪詩以隨車翻縞帶逐馬散銀杯為不工謂坳中初蓋底凸處遂成堆為勝未知真得韓意否也永叔云知聖俞詩者莫如某然聖俞平生所自負者皆某所不好聖俞所卑下者皆某所稱賞知心賞音之難如是其評古人之詩得無似之乎潘閬字逍遙詩有唐人風格有云久客見華髮孤棹桐廬歸新月無朗照落日有餘輝漁浦風水急龍山煙火微時聞沙上雁一一皆南飛嵗暮自桐廬歸錢塘僕以為不減劉長卿太宗晚年燒煉丹藥潘閬嘗獻方書及帝升遐懼誅匿舒州潛山寺為行者題詩於鐘樓云繞寺千千萬萬峰忘第二句頑童趂暖貪春睡忘却登樓打曉鐘孫僅為郡官見詩曰此潘逍遙也告寺僧呼行者潘已亡去王益柔勝之為館職年少意頡頏張掞叔文亦新貼職年長而官已髙每羣聚輒居上座王密於屏風題云四十餘年老健兒此唐徐州節度王智興自詠詩句翌日會食王正座詩下衆無不哂李絢公素有詩贈同姓人曰吾宗天下著王勝之輒取注之曰居甘泉者以謳著京師名倡李氏居甘泉坊善謳賣藥者以朩牛著京師李家賣藥以木牛自表人呼為李木牛圍棊者以憨著李乃國手而神思昏濁人呼為李憨子裁幞頭者以柪著李家幞頭天下稱善而必與人乖刺嵗久自以柪李呼作詩者以豁達著豁達老人喜為詩所至輒自題寫詩句鄙下而自稱豁達李老嘗書人新素墻壁主人憾怒訴官杖之拘執使市石灰更墟漫訖告官乃得縱舍聞者哂之此數人因勝之有云遂自託不朽梅昌言出鎮太原黃覺送詩曰五馬雍容出鎮時都人爭看好風儀文章一代喧髙價忠直三朝受聖知帳下軍容森劒戟門前行色擁旌旗雲籠古戍黃榆暗雪滿長郊白草衰出去暫開貔虎幕歸來須占鳳凰池鬢間未有一莖白陶鑄蒼生固不遲梅雅自修飾容狀偉如大喜之黃覺仕宦不遂嘗送客都門外不及寓邸舍會一道士取所攜酒炙呼飲之既而道士舉杯托水寫呂字覺始悟其為洞賔也又曰明年江南見君覺果得江南官及期見之出懷中大錢七其次十又小錢三曰數不可益也豫藥數寸許告覺曰一以酒磨服之可保一嵗無疾覺如其言至七十餘藥亦垂盡作詩曰牀頭厯日無多子屈指明年七十三果是嵗卒李商隱有錦瑟詩人莫曉其意或謂是令狐楚家青衣名也祥符天禧中楊大年錢文僖晏元獻劉子儀以文章立朝為詩皆宗尚李義山號西崑體後進多竊義山語句賜宴優人有為義山者衣服敗敝告人曰吾為諸館職撏扯至此聞者歡笑大年漢武詩曰力通青海求龍種死諱文成食馬肝待詔先生齒編貝忍令索米向長安義山不能過也元獻王文通詩曰甘泉栁苑秋風急却為流螢下詔書子儀畫義山像寫其詩句列左右貴重之如此楊大年不喜杜工部詩謂為村夫子鄉人有強大年者續杜句曰江漢思歸客楊亦屬對鄉人徐舉乾坤一腐儒楊默然若少屈歐公亦不甚喜杜詩謂韓吏部絶倫吏部於唐世文章未嘗屈下獨稱道李杜不巳歐貴韓而不恱子美所不可曉然於李白而甚賞愛將由李白超趠飛揚為感動也孟東野詩李習之所稱食薺腸亦苦強歌聲不歡出門如有礙誰謂天地寬可謂知音今世傳郊集五卷詩百篇又有集號咸池者僅三百篇其間語句尤多寒澀疑向五卷是名士所刪取者東野與退之聨句語詩宏壯博辨若不出一手王深父云退之容有潤色也張籍樂府詞清麗深婉五言律詩亦平淡可愛至七言詩則質多文少材各有宜不可強衣飾文昌有謝裴司空馬詩曰乍離華廏移蹄澀初到貧家舉眼驚此馬却是一遲鈍多驚者詩詞微而顯亦少其比白樂天詩云請錢不早朝請作平聲唐人語也今人不用厮字唐人作斯音五代巳作入聲陶榖云尖簷帽子卑凡厮是也白曰金屑琵琶槽雪擺胡騰衫琵琶與今人同杜曰皂雕寒始急白曰千呼萬喚始出來人皆為語病事之終始音上聲有所宿留今甫然者音去聲二公詩自非語病唐詩賡和有次韻先後無易有依韻同在一韻有用韻用彼韻不必次吏部和皇甫陸渾山火是也今人多不曉劉長卿餘干旅舍云搖落莫天逈丹楓霜葉稀孤城向水閉獨鳥背人飛渡口月初上鄰家漁未歸鄉心正欲絶何處搗征衣張籍宿江上館云楚驛南渡口夜深來客稀月明見潮上江靜覺鷗飛旅宿今巳逺此行殊未歸離家久無信又聽搗砧衣兩詩偶似次韻皆竒作也管子曰事無終始無務多業此言學者貴能成就也唐人為詩量力致功精思數十年然後名家杜工部詩更覺良工用心苦然豈獨畫手心苦邪真宗問近臣唐酒價幾何莫能對丁晉公獨曰斗直三百上問何以知之曰臣觀杜甫詩速須相就飲一斗恰有三百青銅錢亦一時之善對海陵人王綸女輒為神所馮自稱仙人字善數品形製不相犯吟雪詩云何事月娥欺不在亂飄瑞葉落人間説云天上有瑞木開花六出他詩句詞意飄逸類非世俗可較題金山云濤頭風捲雪山腳石蟠虬常謂綸為清非孺子不曉其義亦有詩贈曰君為秋桐我為春風春風會使秋桐變秋桐不識春風面居數嵗神舍女去懵然無知嫁為廣陵呂氏妻鞠皮為之實以毛蹙踏而戲見霍去病傳注穿城踏鞠晚唐巳不同矣歸氏子弟嘲皮日休云八片尖皮砌作毬火中燂了水中揉一包間氣如常在惹踢招拳卒未休今栁三復能之述曰背裝花屈膝屈口勿反白打大亷斯進前行兩步蹺後立多時栁欲見晉公無由會公蹴毬後園偶迸出栁挾取之因懷所業戴毬以見公出書再拜者三每拜毬起復於背膂幞頭間公乃笑而竒之遂延於門下然弟子拜師常理也獨毬多賤人能之每見勞於富貴子弟莫不拜謝而去此師拜弟子也術不可不慎此亦可喻大云洪州西山與滕王閣相對一僧盡覽詩板告郡守曰盡不佳因朗吟曰洪州太白方積翠倚穹蒼萬古遮新月半江無夕陽守異之遣出閩僧有朋多詩如虹收千嶂雨潮展半江天又曰詩因試客分題僻棊為饒人下著低亦巧思也王丞相嗜諧謔一日論沙門道因曰投老欲依僧客遽對曰急則抱佛腳王曰投老欲依僧是古詩一句客亦曰急則抱佛腳是俗諺全語上去投下去腳豈不的對也王大笑孟蜀時花蘂夫人號能詩而世不傳王平父因治館中廢書得一軸八九十首而存者才三十餘篇大約似王建句若厨船進食簇時新列坐無非侍從臣日午殿頭宣索鱠隔花催喚打魚人月頭支給買花錢滿殿宮娥近數千遇著唱名都不語含羞急過御床前山東二經生同官因舉鄭谷詩云任是深山更深處也應無計避王徭一生難之曰野鷹安得王徭一生解之曰古人寧有失也是年必當索翎毛耳刁景純有見無類必往復歸每至三鼓宋祈判館集僚屬而刁或連日不赴因邀而譙讓之王原叔戲改杜贈鄭廣文云景純過官舍走馬不曽下驀地趂朝歸便遭官長罵李獻臣曰我為足之云多羅四十年偶未識摩氊時西戎唃氏子名摩氊近有王宣政時時與紙錢刁嘗為王宣政作墓銘以古文篆𨽻加褾軸密挂刁聽事會一日大雨不出周步廳廡間始見此圖問之從者曰挂此巳數日矣先造者往往能通念也蘇子美魁偉與宋中道並立下視之笑曰交不著京師市井語也號為錐宋為其頴利而么麼云贈詩曰譬如利錐末所到物巳破後倅洺州洺本趙地有毛遂冢聖俞遂舉處囊事為送行詩戲之司馬溫公論九旗之名旗與旗相近詩曰言觀其旗左傳龍尾伏辰取虢之旗然則比旗當為芹音周人語轉亦如關中以中為蒸蟲為塵丹青之青為萋也五方語異閩以髙為歌荆楚以南為難荆為斤昔閩士作清明象天破題云天道如何仰之罙髙會考官同里遂中選荆楚士題雪用先字後曰十二峰巒旋旋添反讀添為天字也向敏中鎮長安土人不敢賣蒸餅恐觸中字諱也楊安國判監集學官飲必誦詩譜以侑酒舉杯屬客曰詩之興也諒不於上皇之世且飲酒裴如晦亦舉杯曰古者伏羲氏之王天下也不能飲矣一坐皆笑而楊不悟泗州塔人傳下藏真身後閣上碑道興國中塑僧伽像事甚詳退之詩曰火燒水轉掃地空則真身焚矣塔本喻都料造極工巧俗謂塔頂為天門蘇國老詩曰上到天門最髙處不能容物只容身以譏在位者古詩云袖中有短書欲寄雙飛燕以燕時物故寓言爾蜀人自京以鴿寄不浹旬而達船船浮海亦以鴿通信非虛言也史以陸機黃耳為犬能寄書恐不然自洛至吳更厯江淮殆數千里安能諭人而從舟楫乎或者為奴名不然當為神犬也史著赫連勃勃之暴蒸土築城意謂釜甑熟之然不知北方土工用春首聚土陽氣蒸發用築則堅牢特甚故爾近有獻䇿築吳江為甕堤土人欲以巨甕實土稍稍下之不思土實則甕重不可致虛致水中則泛泛曷可止雖執政亦惑之然治河皆有甕堤形似甕耳不用陶器也汪白為平糶詩刺時病云穴垣補墻隙墻成垣巳隳斷屨補穿履履成屨亦虧晏元獻尤喜江南馮延已歌詞其所自作亦不減延巳樂府朩蘭花皆七言詩有云重頭歌詠響􅀈琤入破舞腰紅亂旋重頭入破皆絃管家語也歐陽文忠公見張安陸迎謂曰好雲破月來花弄影韓吏部集有李習之兩句云前之詎灼灼此去信悠悠若無可取鄭州掘一石刻刺史李翺詩曰縣君愛磚渠繞水恣行遊鄙性樂山野掘地便池溝兩岸植芳草中間漾清流所向既不同磚鑿名自修從他後人見景趣誰為幽王深父編次入習之集此别一李翺爾而習之不能詩也吏部讀皇甫湜詩亦譏其掎托糞壤梅聖俞謂尹師魯以古文名而不能詩陳亞以藥名詠白髮云若是道人頭不白老人當日合烏頭貟外郎上官佖嘗勸石少傅中立慎緘石勃然曰上官佖如下官口何韓吏部贈玉川詩曰水北山人得聲名去年去作幕下士水南山人又繼往鞍馬僕從塞閭里少室山人索價髙兩以諫官徵不起又曰先生抱材須大用宰相未許終不仕王向子直謂韓與處士作牙人商度物價也古稱駔儈今謂牙非也劉道源云本稱玄郎主玄市唐人書玄為牙因訛為牙理或信然今言萬為万千為撇非訛也若隱語爾陳文惠堯佐以使相致仕年八十有詩云青雲岐路遊將遍白髮光陰得最多搆亭號佚老後歸政者往往多效之公喜堆墨書遊長安佛寺題名從者誤側硯汙鞋公性急遂窒筆於其鼻客笑失聲若皇甫湜怒其子不暇取杖遂齕臂血流今人呼秃尾狗為厥尾衣之短後者亦曰厥故歐公記陶尚書詩語末厥兵則此兵正謂末賊爾世語虛偽為何樓蓋國初京師有何家樓其下賣物皆行濫者非沽濫稱也世語優人為何市樂説者謂南都石駙馬家樂甚盛詆誚南市中樂人非也蓋唐元和時燕吳行役記其中巳有河市字大抵不𨽻名軍籍而在河市者散樂名也世謂事之陳久為瓚蓋五代時有馬瓚為府幕其人魯戇有所聞見他人巳厭熟而乃甫為新竒道之故今多稱瓚為厭熟京師人貨香印者皆擊鐵盤以示衆人父老云以國初香印字逼近太祖諱故託物默諭梁周翰真宗即位始知誥贈栁開詩曰九重城闕新天子萬卷詩書老舍人時楊大年朱昂同在禁掖楊未及滿三十而二公皆老數見靳侮梁謂之曰公毋侮我老此老亦將留與公爾朱昂聞之背面搖手掖下謂梁曰莫與莫與大年死不及五十余靖兩使契丹情益親習能北語作北語詩契丹主曰卿能道我為卿飲靖舉曰夜宴設邏厚盛也臣拜洗受賜兩朝厥荷通好情感勤厚重微臣雅魯拜舞祝若統福祐聖壽鐵擺嵩髙俱可忒無極主大笑遂為釂觴漢史有槃朩白狼詩譯出夷語殆不若靖真胡語也劉沆亦奉使使凌壓之契丹館客曰有酒如澠繫行人而不住沆應聲曰在北曰狄吹出塞以何妨仁宗待北朝有禮不使纎微忤之二公俱謫官古人多歌舞飲酒唐太宗每舞屬羣臣長沙王亦小舉袖曰國小不足以回旋張燕公詩云醉後歡更好全勝未醉時動容皆是舞出語總成詩李白云要須回舞袖拂盡五松山醉後涼風起吹人舞袖環今時舞者必欲曲盡竒妙又恥效樂工藝益不復如古人常舞矣古人重歌詩自隋以前南北舊曲頗似古如公莫舞丁督護亦自簡淡唐來是等曲又不復入聽矣近世樂府為繁聲加重疊謂之纒聲促數尤甚固不容一唱三歎也胡先生許太學諸生鼓琴吹簫及以方響代編磬所奏唯采蘋鹿鳴數章而巳故稍曼延傍邇鄭衛聲或問之曰無他直纒聲鹿鳴采蘋爾梅聖俞幼戲謝師直詩曰古錦裁詩句斑衣戲坐隅木奴今正熟肯效陸郎無師直小名錦衣奴至十嵗讀此方悟之石曼卿獨行京師一豪士揖之而語曰公幸過我家石許之同入委巷抵大第藻飾宏麗錦繡珠翠殆非人間所擬歌舞歡醉丐書為揮籌筆驛詩數篇以金帛數百千贈之復使騶從送還恍然不知其誰翌日殆無復省所居矣他日遇諸塗又遺以白金數兩謂曰詩中意中流水逺愁外舊山青最為佳句趙少師初在漣水守館不數年後以學士知漣水繼來者名其堂豹隱曼卿有詩曰熊非清渭逢何莫龍卧南陽去不還年少官遊今郡守蔚然疑在立談間後莫偕者曹參嘗為功曹而杜詩云功曹無復漢蕭何誤矣按光武嘗謂鄧禹何以不掾功曹陳子昂云吾聞中山相乃屬放麑翁放麑本秦西巴孟孫氏之臣謂之中山亦誤矣唐韓臯鼓廣陵散其説謂母邱儉諸葛誕刺揚州舉兵討晉不成而散於廣陵爾劉道原謂瑾魏時揚州刺史治夀春儉誕皆死夀春是時廣陵屬徐州至隋唐始為揚州不可不察也景祐中羌人叛詔遺士獻方略率皆得官有題關西驛舍曰弧星熒熒照寒野漢馬蕭蕭五陵下廟堂不肯用竒謀天子徒勞聘賢者萬里危機入燕薊八方殺氣衝靈夏逢時還似不逢時巳矣吾生真茍且宋次道次西都詩以野狐落對五鳳樓言野狐落唐人名宮人所聚也太宗時同年數輩取名似姓者為句云郭鄭鄭東東野絳馬張張夏夏侯璘熙寧初有崔度崔公度王韶王子韶又有章君陳陳君章如以西門豹對東方虬也王丞相云馬子山騎山子馬馬給事字子山穆王八駿有山子馬之名久之人對曰錢衡水盜水衡錢錢某為衡水令人謝之曰正欲作對爾實非有盜也永州何仙姑不飲食無漏泄世傳其神異嶽州天慶觀柱以震折有倒書謝仙火字仙姑云雷部夫婦二人長濶各三尺銀色莫不駭信有熟於江湖間事者曰南方賈人各以火自名一火猶一部也此賈名仙刻朩記已物耳是亦不可知也嘗有道人自言隋唐間人談黃巢事甚悉因曰黃六大晚節至此張安道尚書云巢六兄弟而巢最小當第六由是推之則道人之言信然江州琵琶亭前臨江左枕湓浦地尤勝絶夏梅詩最佳英公公儀夏云年光過眼如車轂職事羈人似馬銜若遇琵琶應大笑何須涕泣滿青衫梅云陶令歸來為逸賦樂天謫宦起悲歌有絃應被無絃笑何況臨絃泣更多又有葉氏女名桂女字月流詩曰樂天當日最多情淚滴青衫酒重傾明月滿船無處問不聞商女琵琶聲詞人以也字作夜音杜云青袍也自公白公云也向慈恩寺裏遊不可如字讀也張湍為河南司録府當祭社買豬以呈尹而豬輒突入湍家湍即捉殺之湍對尹云律云豬無故夜入人家主人登時殺之勿論尹笑之為别市豬張介以命術遊公卿間寓居錢塘西湖上嘗自京師南歸士大夫率為詩贈之呂許公王沂公時方執政亦皆有詩夏鄭公留守南京為詩寄二公曰上公詩筆千金重逋客歸裝一舸輕莫到青山更招隱且留賢哲為蒼生鄭公在朝數為御史糾劾疑時宰諷旨作青雀詩青雀孤飛毛羽單卑棲豈敢礙鵷鸞明珠自有千金價莫為他人作彈丸自唐以來試進士詩號省題近年能詩者亦時有佳句蜀人楊諤宣室受釐落句云願前明主席一問洛陽人滕甫西旅來王云寒日邊聲斷春風塞草長傳聞漢都護歸奉萬年觴諤有詩名題驪山詩云行人問宮殿耕者得珠璣最為警䇿唐人飲酒以令為罰韓吏部詩云令徵前事為白傅詩云醉翻襴衫拋小令今人以絲管歌謳為令者即白傅所謂大都欲以酒勸故始言送而繼承者辭之搖首挼舞之屬皆却之也至八遍而窮斯可受矣其舉故事物色則韓詩所謂耳近嵗有以進士為舉首者其黨人意侮之會其人出令以字偏傍為率曰金銀叉釧鋪次一人曰絲綿紬絹綱至其黨人曰鬼魅魍魎魁俗有謎語曰急打急圓慢打慢圓分為四段送在窑前初以陶瓦乃為令耳陳文惠善為四句詩在江湖有詩云平波渺渺煙蒼蒼菰蒲才熟楊栁黃扁舟繫岸不忍去秋風斜日鱸魚鄉文惠年六十餘才為知制誥其後遂至真宰使相致仕文惠喜堆墨書深自矜負號前無古人後無來者與石少傅同在政府石欲戲之政事堂有黑漆大飯牀長五六尺許石取白堊橫畫其中可尺餘而謂陳曰吾頗學公堆墨字陳聞之歡甚石顧小吏二人舁飯牀出曰吾巳能寫口字陳為悵然江鄰幾善為詩清淡有古風蘇子美坐進奏院事謫官後死吳中江作詩云郡邸獄寃誰與辨臯橋客死世同悲用事甚精當嘗有古詩云五十踐衰境加我在明年論者謂莫不用事能令事如已出天然渾厚乃可言詩江得之矣江天質淳雅喜飲酒鼓琴圍棊人以酒召之未嘗不往飲未嘗不醉巳醉眠人強起飲之亦不辭也或不能歸即留宿人家商度風韻陶靖節之比江嘗通判廬州有酒官善琴以坐局不得出江且就之郡中沙門羽士及里氓能棊者數人呼與同往郡人見之習熟因畫為圖前列騶導有一人騎馬青蓋其後沙門羽士褐衣數人葛巾芒履纍纍相尋意思蕭散惜時無名手此畫不足傳後何必減嵇阮也道人張無夢在真宗朝以處士見除挍書郎無夢善攝生梅昌言知蘇州無夢求見之先與詩壺中一粒長生藥待與蘇州太守分好為大言處之不疑自比李少君然無夢年九十死無夢語人少時絶欲屏居山中十餘嵗自以為不動及出見婦人美色乃復歉然又入山十餘年乃始寂定勸人飲食毋用鹽醋煮餅淡食更自有天然味無夢老病耳聾其死亦無他異蜀人李士寧好言鬼神詭異事為余言嘗泛海值風廣利王使存問已又嘗一夜有人傳相公命已及往燕設甚盛飲食醉飽既寤乃在梁門外疑所謂相公者二相神也人皆言士寧能他心通士寧過豫豫故默作念侮戲之竟日士寧不知惡在其通也士大夫多遺其金帛錢物士寧以是財用常饒足人又以為有術能歸錢與李少君類矣中山詩話
