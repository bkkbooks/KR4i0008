body:
  text: 中山詩話詩文評類提要臣等謹按中山詩話一卷宋劉攽撰攽字貢父新喻人敞之弟也與敞同舉慶厯六年進士歷官祕書少監出知蔡州後終於中書舍人所著公非先生集嵗久散佚已非完帙惟詩話猶為舊本攽素稱博洽而於花蕊夫人宫詞百首僅見三十餘篇豈當攽之時全稿未盡出耶其論李商隱錦瑟詩以為令狐楚青衣之名頗為影撰其論赫連勃勃蒸土一條亦頗不確論陸機黃犬一條尤為迂濶不但朝公武所摘蕭何功曹一事至開卷第二條所引劉子儀詩以師問達為師也達將詮語賜也達師也辟二句牽混殊不可解所載嘲謔之詞彌多冗雜攽好詼諧嘗坐是為馬默所彈殆性之所近不覺濫收耶北宋詩話惟歐陽修司馬光及攽三家號為最古此編較歐陽修司馬光二家雖似不及然攽在元祐諸人之中學問最有根柢所考證議論可取者多究非南宋江湖末派鈎棘字句以空談説詩者比也乾隆四十一年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:5e564c1c73c503480be3fb594aa44f88a314de89663c3fa23324070434c03318
